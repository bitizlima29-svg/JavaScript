<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema com Const e Let</title>

<style>
body {
font-family: Arial, sans-serif;
background: #e3f2fd;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
background: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.2);
text-align: center;
width: 300px;
}

input {
width: 90%;
padding: 8px;
margin: 5px 0;
}

button {
padding: 10px;
background: #2196f3;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

button:hover {
background: #1976d2;
}

#resultado {
margin-top: 15px;
font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Digite seus dados</h2>

<input type="text" id="nome" placeholder="Seu nome">
<input type="number" id="num1" placeholder="Número 1">
<input type="number" id="num2" placeholder="Número 2">
<input type="number" id="num3" placeholder="Número 3">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>
</div>

<script>
function calcular() {
// valor fixo (não muda)
const sistema = "Calculadora Simples";

// valores que podem mudar
let nome = document.getElementById("nome").value;
let n1 = Number(document.getElementById("num1").value);
let n2 = Number(document.getElementById("num2").value);
let n3 = Number(document.getElementById("num3").value);

let soma = n1 + n2 + n3;

document.getElementById("resultado").innerHTML =
sistema + "<br>" +
"Olá, " + nome + "!<br>" +
"A soma é: " + soma;
}
</script>

</body>
</html>
