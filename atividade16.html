<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Atividades/css/style.css">
</head>

<body>
    



<style>
body {
font-family: Arial, sans-serif;
background: #2c2c2c;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.calculadora {
background: #1e1e1e;
padding: 20px;
border-radius: 15px;
box-shadow: 0 0 20px rgba(0,0,0,0.5);
width: 250px;
text-align: center;
}

.calculadora h2 {
color: #fff;
margin-bottom: 15px;
}

input {
width: 90%;
padding: 10px;
margin: 8px 0;
border: none;
border-radius: 8px;
font-size: 16px;
text-align: center;
background: #333;
color: #fff;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
border: none;
border-radius: 10px;
font-size: 16px;
background: #4CAF50;
color: white;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #45a049;
}

#resultado {
margin-top: 15px;
color: #00ffcc;
font-size: 18px;
font-weight: bold;
}
</style>
</head>

<body>

<div class="calculadora">
<h2>Calculadora</h2>

<input type="number" id="num1" placeholder="Número 1">
<input type="number" id="num2" placeholder="Número 2">

<button onclick="somar()">Somar</button>

<p id="resultado"></p>
</div>

<script>
function somar() {
let numero1 = Number(document.getElementById("num1").value);
let numero2 = Number(document.getElementById("num2").value);

let soma = numero1 + numero2;

document.getElementById("resultado").innerText = "Resultado: " + soma;
}
</script>

</body>
</html>



    </style>
</body>

</html>
